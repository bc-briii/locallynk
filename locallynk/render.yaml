services:
  - type: web
    name: locallynk-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: locallynk-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: locallynk-db
    engine: postgres
    version: "15"
    plan: free
